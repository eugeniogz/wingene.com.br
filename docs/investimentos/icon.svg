<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Fundo Escuro com Brilho Radial -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e1b2e" />
      <stop offset="60%" stop-color="#111017" />
      <stop offset="100%" stop-color="#08080b" />
    </radialGradient>

    <!-- Degradê Dourado Premium -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Degradê Dourado Claro (Facetas Iluminadas) -->
    <linearGradient id="goldLightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Degradê Verde Esmeralda -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Sombra e Brilho Central -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fundo Arredondado PWA -->
  <rect width="512" height="512" rx="104" fill="url(#bgGrad)" />
  <rect width="496" height="496" x="8" y="8" rx="96" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="3" />

  <!-- AURA DE BRILHO CENTRAL -->
  <circle cx="256" cy="256" r="170" fill="#10b981" opacity="0.15" filter="url(#glow)" />

  <!-- ESTRELA ORIGINAL DE 6 PONTAS FACETADA (3D) CENTRALIZADA -->
  <g transform="translate(256, 256) scale(1.95)">
    <!-- Ponta 1: Superior (Norte) -->
    <polygon points="0,0 0,-85 -18,-31.18" fill="url(#goldLightGrad)" />
    <polygon points="0,0 0,-85 18,-31.18" fill="url(#goldGrad)" />

    <!-- Ponta 2: Superior Direita -->
    <polygon points="0,0 73.61,-42.5 18,-31.18" fill="url(#greenGrad)" />
    <polygon points="0,0 73.61,-42.5 36,0" fill="#059669" />

    <!-- Ponta 3: Inferior Direita -->
    <polygon points="0,0 73.61,42.5 36,0" fill="url(#goldLightGrad)" />
    <polygon points="0,0 73.61,42.5 18,31.18" fill="url(#goldGrad)" />

    <!-- Ponta 4: Inferior (Sul) -->
    <polygon points="0,0 0,85 18,31.18" fill="url(#greenGrad)" />
    <polygon points="0,0 0,85 -18,31.18" fill="#047857" />

    <!-- Ponta 5: Inferior Esquerda -->
    <polygon points="0,0 -73.61,42.5 -18,31.18" fill="url(#goldLightGrad)" />
    <polygon points="0,0 -73.61,42.5 -36,0" fill="url(#goldGrad)" />

    <!-- Ponta 6: Superior Esquerda -->
    <polygon points="0,0 -73.61,-42.5 -36,0" fill="url(#greenGrad)" />
    <polygon points="0,0 -73.61,-42.5 -18,-31.18" fill="#059669" />

    <!-- Núcleo Central Hexagonal -->
    <polygon points="0,-31.18 27,-15.59 27,15.59 0,31.18 -27,15.59 -27,-15.59" fill="#0a0a0e" stroke="url(#goldGrad)" stroke-width="3" />
    <circle cx="0" cy="0" r="12" fill="url(#goldLightGrad)" />
  </g>
</svg>
